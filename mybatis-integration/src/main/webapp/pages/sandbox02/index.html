<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandbox02</title>
  </head>
  <body>
    <h1>Sandbox02</h1>
	<div>
		<a href="../../">..</a>
	</div>

	<div>
		<button type="button" id="searchButton">search</button>
		
		<table id="appLogsTable">
			<thead>
				<tr>
					<td>seq</td>
					<td>message</td>
					<td>createdAt</td>
					<td>updatedAt</td>
				</tr>
			</thead>
			<tbody>
				
			</tbody>
		</table>
	</div>
	<script type="text/javascript">
		(function() {
			const apiRoot = `/mybatis-integration/api`
			
			const searchButtonElem = document.getElementById('searchButton')
			const appLogsTableElem = document.getElementById('appLogsTable')
			const appLogsTableBodyElem = appLogsTableElem.querySelector('tbody')
			
			searchButtonElem.addEventListener('click', search)
			
			async function search() {
				const url = `${apiRoot}/sandbox02/search`

				const resp = await fetch(url, {
					method: 'get',
				})
				const respBodyText = await resp.text()
				console.log(respBodyText)
				
				applyResults(JSON.parse(respBodyText).records)
			}
			
			function applyResults(records) {
				appLogsTableBodyElem.innerHTML = "";
				
				const fragment = document.createDocumentFragment();
				for(let record of records) {
					const tr = document.createElement("tr");

					const tdSeq = document.createElement("td");
					tdSeq.textContent = record.seq;
					tr.appendChild(tdSeq)

					const tdMessage = document.createElement("td");
					tdMessage.textContent = record.logMessage;
					tr.appendChild(tdMessage)

					const tdCreatedAt = document.createElement("td");
					tdCreatedAt.textContent = record.createdAt;
					tr.appendChild(tdCreatedAt)

					const tdUpdatedAt = document.createElement("td");
					tdUpdatedAt.textContent = record.updatedAt;
					tr.appendChild(tdUpdatedAt)

					fragment.appendChild(tr);
				}
				appLogsTableBodyElem.appendChild(fragment);
			}
			
			
			search()
		})()
	</script>
  </body>
</html>
